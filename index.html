<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>优先罗盘</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F7FF;--bg2:#FFFFFF;--bg3:#EEF1FB;--bg4:#E4E8F7;
  --border:rgba(99,120,210,0.12);--border2:rgba(99,120,210,0.22);
  --accent:#5B7FE8;--accent2:#7A99F0;--accent-dim:rgba(91,127,232,0.10);
  --text:#2D3354;--text2:#6B748F;--text3:#A8B0C8;
  --success:#3DBD7D;--warn:#F0A030;--danger:#E05555;
  --font:'Noto Sans SC',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.app{display:flex;width:960px;height:640px;background:var(--bg2);border-radius:16px;overflow:hidden;position:relative;box-shadow:0 4px 40px rgba(91,127,232,0.13);}

/* LOGIN */
.login-screen{position:absolute;inset:0;background:linear-gradient(135deg,#EEF2FF 0%,#F5F7FF 50%,#EBF5FF 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;border-radius:16px;}
.compass-icon{width:96px;height:96px;margin-bottom:20px;}
@keyframes needle{0%{transform:rotate(-22deg)}50%{transform:rotate(10deg)}75%{transform:rotate(-5deg)}100%{transform:rotate(0deg)}}
.compass-needle{transform-origin:50% 50%;animation:needle 2.6s cubic-bezier(.4,0,.2,1) forwards;}
.login-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;text-align:center;line-height:1.7;}
.login-form{display:flex;flex-direction:column;align-items:center;gap:9px;width:280px;}
.login-label{font-size:11px;color:var(--text3);align-self:flex-start;letter-spacing:1px;text-transform:uppercase;}
.login-input{width:100%;padding:11px 14px;background:#fff;border:1.5px solid var(--border2);border-radius:9px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px;}
.login-btn:hover{opacity:.88;}
.login-btn:active{transform:scale(.98);}
.login-error{font-size:12px;color:var(--danger);align-self:flex-start;display:none;}

/* SIDEBAR */
.sidebar{width:64px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:2px;transition:width .25s ease;overflow:hidden;flex-shrink:0;}
.sidebar.open{width:200px;align-items:flex-start;}
.sidebar-logo{width:36px;height:36px;border-radius:9px;background:var(--accent-dim);border:1px solid rgba(91,127,232,0.2);display:flex;align-items:center;justify-content:center;margin:0 14px 18px;flex-shrink:0;}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 14px;width:100%;border-bottom:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-dim);border:1.5px solid rgba(91,127,232,0.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent);}
.user-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;color:var(--text);}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;width:100%;cursor:pointer;transition:background .15s;color:var(--text3);border-left:2px solid transparent;white-space:nowrap;overflow:hidden;}
.nav-item:hover{background:var(--bg3);color:var(--text2);}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim);}
.nav-icon{width:20px;height:20px;flex-shrink:0;}
.nav-label{font-size:13px;}
.toggle-btn{margin-top:auto;width:34px;height:34px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:center;flex-shrink:0;transition:background .15s;}
.toggle-btn:hover{background:var(--bg4);}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);}
.view{flex:1;overflow-y:auto;padding:28px 32px;display:none;}
.view.visible{display:block;}
.view::-webkit-scrollbar{width:4px;}
.view::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.view-title{font-size:18px;font-weight:600;margin-bottom:6px;color:var(--text);}
.view-sub{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6;}

/* HOME */
.home-entry-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.entry-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:22px 20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:9px;}
.entry-card:hover{border-color:var(--accent2);box-shadow:0 4px 16px rgba(91,127,232,0.10);transform:translateY(-1px);}
.entry-card.primary{border-color:rgba(91,127,232,0.3);background:linear-gradient(135deg,rgba(91,127,232,0.06),rgba(91,127,232,0.02));}
.entry-card-icon{font-size:26px;}
.entry-card-label{font-size:15px;font-weight:600;color:var(--text);}
.entry-card-desc{font-size:12px;color:var(--text2);line-height:1.6;}
.entry-card-arrow{font-size:18px;color:var(--accent);align-self:flex-end;margin-top:2px;}
.section-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}

/* TODO */
.todo-list{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.todo-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px 14px;}
.todo-check{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.todo-check.done{background:var(--success);border-color:var(--success);}
.todo-check.done::after{content:'✓';font-size:10px;color:#fff;}
.todo-text{font-size:13px;flex:1;color:var(--text);}
.todo-text.striked{text-decoration:line-through;color:var(--text3);}
.todo-pri{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:4px;flex-shrink:0;}
.pri-high{background:rgba(224,85,85,0.10);color:var(--danger);}
.pri-mid{background:rgba(240,160,48,0.10);color:var(--warn);}
.pri-low{background:rgba(91,127,232,0.10);color:var(--accent);}
.del-btn{cursor:pointer;color:var(--text3);font-size:17px;padding:0 3px;line-height:1;flex-shrink:0;}
.del-btn:hover{color:var(--danger);}
.todo-add-row{display:flex;gap:8px;margin-bottom:20px;}
.todo-add-input{flex:1;padding:9px 12px;background:#fff;border:1.5px solid var(--border2);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color .2s;}
.todo-add-input:focus{border-color:var(--accent);}
.todo-add-btn{padding:9px 16px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:13px;cursor:pointer;white-space:nowrap;}
.goto-decision-btn{width:100%;padding:13px;background:var(--accent-dim);border:1.5px dashed rgba(91,127,232,0.4);border-radius:11px;color:var(--accent);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.goto-decision-btn:hover{background:rgba(91,127,232,0.16);}

/* CALENDAR */
.cal-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.cal-month{font-size:14px;font-weight:500;color:var(--text);}
.cal-nav{background:#fff;border:1px solid var(--border2);border-radius:6px;width:26px;height:26px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:14px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:18px;}
.cal-dow{text-align:center;font-size:10px;color:var(--text3);padding:5px 0;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:12px;color:var(--text2);cursor:pointer;transition:background .13s;gap:2px;}
.cal-day:hover{background:var(--bg3);}
.cal-day.today{background:var(--accent-dim);color:var(--accent);font-weight:600;}
.cal-day.has-event::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--accent);display:block;}
.cal-day.other-month{color:var(--text3);}
.event-list{display:flex;flex-direction:column;gap:7px;}
.event-item{background:#fff;border:1px solid var(--border);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:12px;}
.event-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.event-info{flex:1;}
.event-name{font-size:13px;font-weight:500;margin-bottom:2px;color:var(--text);}
.event-time{font-size:11px;color:var(--text3);font-family:var(--mono);}
.event-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--accent-dim);color:var(--accent);}

/* DECISION */
.decision-view{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.step-nav{display:flex;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid var(--border);gap:0;overflow-x:auto;flex-shrink:0;}
.step-nav::-webkit-scrollbar{height:0;}
.step-pill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;color:var(--text3);cursor:pointer;transition:all .18s;white-space:nowrap;border:1px solid transparent;}
.step-pill:hover{color:var(--text2);background:var(--bg3);}
.step-pill.done{color:var(--success);}
.step-pill.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(91,127,232,0.25);}
.step-num{width:17px;height:17px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-family:var(--mono);}
.step-pill.done .step-num{background:rgba(61,189,125,0.12);border-color:var(--success);}
.step-arrow{color:var(--text3);font-size:11px;padding:0 2px;flex-shrink:0;}
.step-content{flex:1;overflow-y:auto;padding:24px 28px;}
.step-content::-webkit-scrollbar{width:4px;}
.step-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.step-heading{font-size:19px;font-weight:600;margin-bottom:5px;color:var(--text);}
.step-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.7;}
.input-area{width:100%;background:#fff;border:1.5px solid var(--border2);border-radius:10px;padding:13px;font-family:var(--font);font-size:14px;color:var(--text);resize:none;outline:none;min-height:90px;transition:border-color .2s;line-height:1.7;}
.input-area:focus{border-color:var(--accent);}
.input-area::placeholder{color:var(--text3);}
.status-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.status-group{flex:1;min-width:130px;}
.status-label{font-size:10px;color:var(--text3);letter-spacing:.8px;margin-bottom:6px;text-transform:uppercase;}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;}
.chip{padding:5px 10px;border-radius:6px;font-size:12px;background:#fff;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;}
.chip:hover{border-color:var(--accent2);color:var(--text);}
.chip.selected{background:var(--accent-dim);border-color:rgba(91,127,232,0.35);color:var(--accent);font-weight:500;}
.dim-grid{display:flex;flex-direction:column;gap:8px;}
.dim-row{background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px 14px;display:flex;align-items:flex-start;gap:12px;}
.dim-label{font-size:12px;color:var(--text2);flex-shrink:0;line-height:1.5;font-weight:500;}
.dim-hint{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;}
.dim-label-wrap{width:90px;flex-shrink:0;padding-top:3px;}
.dim-right{display:flex;flex-direction:column;gap:6px;flex:1;}
.dim-chips{display:flex;gap:5px;flex-wrap:wrap;}
.dim-note-wrap{margin-top:2px;}
.dim-note{width:100%;padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);font-family:var(--font);font-size:11px;color:var(--text2);outline:none;transition:border-color .2s;}
.dim-note:focus{border-color:var(--accent);background:#fff;}
.dim-note::placeholder{color:var(--text3);}
.dim-chip{padding:4px 9px;border-radius:5px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;}
.dim-chip:hover{border-color:var(--accent2);color:var(--text);}
.dim-chip.selected{background:var(--accent-dim);border-color:rgba(91,127,232,0.35);color:var(--accent);font-weight:500;}
.ai-badge{display:inline-flex;align-items:center;font-size:10px;color:var(--accent);background:var(--accent-dim);padding:2px 7px;border-radius:10px;margin-left:8px;font-weight:400;}
.report-grid{display:grid;grid-template-columns:180px 1fr;gap:20px;align-items:start;}
.report-right{max-height:420px;overflow-y:auto;padding-right:4px;}
.report-right::-webkit-scrollbar{width:3px;}
.report-right::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.step-list{display:flex;flex-direction:column;gap:5px;}
.step-list-item{display:flex;gap:8px;font-size:13px;line-height:1.6;color:var(--text2);}
.step-num-badge{width:18px;height:18px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(91,127,232,0.3);color:var(--accent);font-size:10px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.resource-item{display:flex;gap:8px;font-size:13px;line-height:1.6;color:var(--text2);margin-bottom:4px;}
.resource-bullet{color:var(--success);flex-shrink:0;font-weight:700;}
.perspective-box{background:linear-gradient(135deg,rgba(91,127,232,0.05),rgba(61,189,125,0.04));border:1px solid rgba(91,127,232,0.15);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--text2);line-height:1.7;font-style:italic;}
.review-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:10px;}
.review-badge.done{background:rgba(61,189,125,0.12);color:var(--success);}
.review-badge.pending{background:rgba(240,160,48,0.10);color:var(--warn);}
.review-modal-section{border-top:1px solid var(--border);padding-top:16px;margin-top:16px;}
.review-modal-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;}
.review-dim-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.review-dim-label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0;}
.review-chips{display:flex;gap:6px;flex-wrap:wrap;}
.review-chip{padding:4px 10px;border-radius:6px;font-size:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;}
.review-chip:hover{border-color:var(--accent2);}
.review-chip.selected{background:var(--accent-dim);border-color:rgba(91,127,232,0.35);color:var(--accent);font-weight:500;}
.review-textarea{width:100%;padding:9px 12px;background:#fff;border:1.5px solid var(--border2);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--text);resize:none;outline:none;line-height:1.6;}
.review-textarea:focus{border-color:var(--accent);}
.review-ai-result{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.75;margin-top:10px;}
.review-submit-btn{padding:9px 20px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:13px;cursor:pointer;font-weight:500;margin-top:12px;}
.review-submit-btn:hover{opacity:.86;}
.radar-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.score-big{font-size:40px;font-weight:700;font-family:var(--mono);color:var(--accent);line-height:1;margin-top:8px;}
.score-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:3px;margin-bottom:10px;}
.verdict-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:8px;font-size:12px;font-weight:500;}
.verdict-badge.high{background:rgba(224,85,85,0.10);color:var(--danger);border:1px solid rgba(224,85,85,0.25);}
.verdict-badge.mid{background:rgba(240,160,48,0.10);color:var(--warn);border:1px solid rgba(240,160,48,0.25);}
.verdict-badge.low{background:rgba(61,189,125,0.10);color:var(--success);border:1px solid rgba(61,189,125,0.25);}
.report-sections{display:flex;flex-direction:column;gap:10px;}
.report-section{background:#fff;border:1px solid var(--border);border-radius:9px;padding:12px 16px;}
.report-section-title{font-size:10px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;}
.report-section-body{font-size:13px;color:var(--text2);line-height:1.75;}
.reason-item,.risk-item{display:flex;gap:8px;font-size:13px;line-height:1.7;color:var(--text2);margin-bottom:4px;}
.reason-bullet{color:var(--accent);flex-shrink:0;font-weight:700;}
.risk-bullet{color:var(--warn);flex-shrink:0;}
.action-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.action-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;}
.action-card:hover{border-color:var(--accent2);background:var(--accent-dim);}
.action-card.selected{border-color:var(--accent);background:var(--accent-dim);}
.action-card-icon{font-size:22px;}
.action-card-label{font-size:14px;font-weight:500;color:var(--text);}
.action-card-desc{font-size:11px;color:var(--text3);line-height:1.5;}
.time-picker{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;display:none;}
.time-picker.visible{display:block;}
.time-picker-title{font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:500;}
.time-slots{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.time-slot{padding:6px 14px;border-radius:6px;font-size:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;}
.time-slot:hover{border-color:var(--accent2);}
.time-slot.selected{background:var(--accent-dim);border-color:rgba(91,127,232,0.35);color:var(--accent);font-weight:500;}
.custom-time-row{display:flex;align-items:center;gap:8px;}
.custom-time-input{padding:7px 10px;border-radius:7px;border:1px solid var(--border2);font-family:var(--font);font-size:12px;color:var(--text);background:#fff;outline:none;}
.custom-time-input:focus{border-color:var(--accent);}
.encourage-box{background:linear-gradient(135deg,rgba(91,127,232,0.07),rgba(61,189,125,0.06));border:1px solid rgba(91,127,232,0.18);border-radius:12px;padding:18px 20px;margin-bottom:14px;}
.encourage-icon{font-size:20px;margin-bottom:6px;}
.encourage-text{font-size:14px;color:var(--text);line-height:1.75;}
.encourage-sub{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.6;}
.btn-row{display:flex;gap:9px;margin-top:14px;}
.btn{padding:9px 18px;border-radius:8px;font-family:var(--font);font-size:13px;cursor:pointer;font-weight:500;transition:opacity .18s;}
.btn-primary{background:var(--accent);border:none;color:#fff;}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--text2);}
.btn:hover{opacity:.82;}
.next-btn-row{display:flex;justify-content:flex-end;margin-top:16px;}
.next-btn{padding:9px 22px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:13px;cursor:pointer;font-weight:500;}
.next-btn:hover{opacity:.86;}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px;padding:20px 0;}
.mic-wrap{position:relative;margin-top:8px;display:flex;align-items:center;gap:8px;}
.mic-btn{width:44px;height:44px;border-radius:50%;background:var(--accent-dim);border:1.5px solid rgba(91,127,232,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;user-select:none;-webkit-user-select:none;}
.mic-btn:hover{background:rgba(91,127,232,0.18);}
.mic-btn.listening{background:var(--danger);border-color:var(--danger);animation:micPulse 0.8s ease-in-out infinite;}
.mic-btn.unsupported{display:none;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(224,85,85,0.4)}50%{box-shadow:0 0 0 8px rgba(224,85,85,0)}}
.mic-status{font-size:12px;color:var(--text3);transition:color .2s;}
.mic-status.listening{color:var(--danger);font-weight:500;}
.dot-pulse{display:flex;gap:5px;}
.dot-pulse span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dp 1.2s infinite ease-in-out;}
.dot-pulse span:nth-child(2){animation-delay:.2s;}
.dot-pulse span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.history-item{background:#fff;border:1px solid var(--border);border-radius:9px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
.history-event{font-size:13px;font-weight:500;color:var(--text);}
.history-meta{display:flex;gap:10px;font-size:11px;color:var(--text3);}
.history-score{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:4px;background:var(--accent-dim);color:var(--accent);}
.history-item{cursor:pointer;transition:border-color .15s;}
.history-item:hover{border-color:var(--accent2);}
.history-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.history-check.checked{background:var(--accent);border-color:var(--accent);}
.history-check.checked::after{content:'✓';font-size:10px;color:#fff;}
.history-toolbar{display:none;align-items:center;gap:10px;padding:10px 14px;background:var(--accent-dim);border:1px solid rgba(91,127,232,0.25);border-radius:9px;margin-bottom:12px;}
.history-toolbar.visible{display:flex;}
.history-selected-count{font-size:13px;color:var(--accent);flex:1;}
.history-delete-btn{padding:6px 14px;background:var(--danger);border:none;border-radius:7px;color:#fff;font-family:var(--font);font-size:12px;cursor:pointer;font-weight:500;}
.history-delete-btn:hover{opacity:.85;}
.modal-overlay{position:fixed;inset:0;background:rgba(45,51,84,0.5);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.visible{display:flex;}
.modal-box{background:#fff;border-radius:14px;width:680px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(45,51,84,0.2);}
.modal-header{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-title{font-size:15px;font-weight:600;flex:1;color:var(--text);}
.modal-meta{font-size:12px;color:var(--text3);margin-left:10px;}
.modal-close{width:28px;height:28px;border-radius:7px;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);}
.modal-close:hover{background:var(--bg4);}
.modal-body{overflow-y:auto;padding:20px;display:grid;grid-template-columns:160px 1fr;gap:16px;}
.modal-body::-webkit-scrollbar{width:4px;}
.modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.modal-left{display:flex;flex-direction:column;align-items:center;gap:8px;}
.modal-right{display:flex;flex-direction:column;gap:10px;}
.modal-action-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;font-size:12px;font-weight:500;}
.modal-action-badge.now{background:rgba(224,85,85,0.1);color:var(--danger);border:1px solid rgba(224,85,85,0.2);}
.modal-action-badge.later{background:rgba(240,160,48,0.1);color:var(--warn);border:1px solid rgba(240,160,48,0.2);}
.modal-action-badge.archive{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.sync-indicator{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--text2);display:none;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.sync-indicator.visible{display:block;}

/* ── EMOTION CSS ── */
/* 设置按钮 */
.settings-btn{margin-top:6px;width:34px;height:34px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:center;flex-shrink:0;font-size:16px;transition:background .15s;}
.settings-btn:hover{background:var(--bg4);}
.settings-panel{position:absolute;bottom:60px;left:8px;width:200px;background:#fff;border:1.5px solid var(--border2);border-radius:12px;padding:16px;box-shadow:0 4px 20px rgba(91,127,232,0.15);z-index:50;display:none;}
.settings-panel.visible{display:block;}
.settings-title{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.mode-toggle{display:flex;background:var(--bg3);border-radius:8px;padding:3px;gap:3px;}
.mode-btn{flex:1;padding:7px;border:none;border-radius:6px;font-family:var(--font);font-size:12px;cursor:pointer;background:transparent;color:var(--text2);transition:all .2s;}
.mode-btn.active{background:#fff;color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,0.08);}

/* 情绪报告卡片 */
.verdict-emotion-card{border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.verdict-emotion-card.high{background:linear-gradient(135deg,rgba(224,85,85,0.12),rgba(224,85,85,0.06));border:1.5px solid rgba(224,85,85,0.35);}
.verdict-emotion-card.mid{background:linear-gradient(135deg,rgba(240,160,48,0.12),rgba(240,160,48,0.06));border:1.5px solid rgba(240,160,48,0.35);}
.verdict-emotion-card.low{background:linear-gradient(135deg,rgba(91,127,232,0.10),rgba(91,127,232,0.04));border:1.5px solid rgba(91,127,232,0.25);}
.verdict-emotion-text{flex:1;}
.verdict-emotion-label{font-size:16px;font-weight:700;margin-bottom:4px;}
.verdict-emotion-card.high .verdict-emotion-label{color:var(--danger);}
.verdict-emotion-card.mid .verdict-emotion-label{color:var(--warn);}
.verdict-emotion-card.low .verdict-emotion-label{color:var(--accent);}
.verdict-emotion-sub{font-size:12px;line-height:1.6;}
.verdict-emotion-card.high .verdict-emotion-sub{color:#c04040;}
.verdict-emotion-card.mid .verdict-emotion-sub{color:#b07020;}
.verdict-emotion-card.low .verdict-emotion-sub{color:var(--text2);}

/* 决策后大卡片弹出 */
.hype-overlay{position:fixed;inset:0;background:rgba(45,51,84,0.6);z-index:300;display:none;align-items:center;justify-content:center;}
.hype-overlay.visible{display:flex;animation:fadeInBg .3s ease;}
@keyframes fadeInBg{from{opacity:0}to{opacity:1}}
.hype-card{background:#fff;border-radius:20px;padding:32px 36px;text-align:center;max-width:400px;width:90%;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(45,51,84,0.25);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.6) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.hype-card-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(91,127,232,0.06) 0%,rgba(61,189,125,0.04) 100%);}
.hype-score{font-size:56px;font-weight:700;font-family:var(--mono);color:var(--accent);line-height:1;margin-bottom:4px;position:relative;}
.hype-verdict{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;position:relative;}
.hype-message{font-size:18px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:8px;position:relative;}
.hype-submsg{font-size:13px;color:var(--text2);margin-bottom:20px;position:relative;}
.hype-close{padding:10px 28px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;position:relative;transition:transform .15s;}
.hype-close:hover{transform:scale(1.04);}
.hype-runner{position:relative;height:80px;margin-bottom:8px;overflow:visible;}

/* SVG小人动画 */
@keyframes runCycle{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
@keyframes armSwing{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}
@keyframes legSwing{0%,100%{transform:rotate(20deg)}50%{transform:rotate(-20deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes flagWave{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(10deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes dash{0%{stroke-dashoffset:100}100%{stroke-dashoffset:0}}

/* 紧急待办标记 */
.urgent-flag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;}
.urgent-flag.high{background:rgba(224,85,85,0.12);color:var(--danger);}
.compare-btn{width:100%;padding:11px;background:var(--bg3);border:1.5px dashed var(--border2);border-radius:10px;color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;transition:all .15s;margin-top:8px;}
.compare-btn:hover{border-color:var(--accent2);color:var(--accent);background:var(--accent-dim);}
.compare-panel{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:10px;display:none;}
.compare-panel.visible{display:block;}
.compare-panel-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;}
.compare-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;margin-bottom:12px;}
.compare-list::-webkit-scrollbar{width:3px;}
.compare-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.compare-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;}
.compare-item:hover{border-color:var(--accent2);}
.compare-item.selected{background:var(--accent-dim);border-color:rgba(91,127,232,0.35);}
.compare-item-text{flex:1;font-size:13px;color:var(--text);}
.compare-item-score{font-size:11px;font-family:var(--mono);color:var(--accent);background:var(--accent-dim);padding:2px 7px;border-radius:4px;flex-shrink:0;}
.compare-item-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;}
.compare-item.selected .compare-item-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.compare-run-btn{width:100%;padding:9px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:13px;cursor:pointer;font-weight:500;}
.compare-run-btn:hover{opacity:.86;}
.compare-result{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px;}
.compare-result-title{font-size:11px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}
.compare-rank-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.compare-rank-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.compare-rank-num.rank1{background:rgba(224,85,85,0.12);color:var(--danger);}
.compare-rank-num.rank2{background:rgba(240,160,48,0.12);color:var(--warn);}
.compare-rank-num.rank3{background:rgba(91,127,232,0.12);color:var(--accent);}
.compare-rank-num.rankn{background:var(--bg3);color:var(--text3);}
.compare-rank-text{flex:1;font-size:13px;color:var(--text);}
.compare-rank-score{font-size:12px;font-family:var(--mono);color:var(--text2);}
.compare-ai-note{font-size:13px;color:var(--text2);line-height:1.7;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
</style>
</head>
<body>
<div class="app" id="app">

<!-- LOGIN -->

  <!-- 热血背景 -->
  <div style="position:absolute;inset:0;pointer-events:none;z-index:0;">
    <svg width="100%" height="100%" viewBox="0 0 680 640" fill="none" preserveAspectRatio="xMidYMid slice">
      <style>

        <path d="M422 270 Q424 259 420 251" stroke="#4A5BA8" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.65"/>
        <ellipse cx="420" cy="246" rx="13" ry="11" fill="#3D4F8A" opacity="0.65"/>
        <path d="M416 246 Q414 230 413 217 Q412 210 416 207 Q421 205 423 209 Q425 214 423 227 L421 240Z" fill="#3D4F8A" opacity="0.75"/>
        <path d="M423 245 Q424 228 425 215 Q426 208 430 206 Q434 205 435 210 Q436 215 434 228 L430 242Z" fill="#3D4F8A" opacity="0.75"/>
        <ellipse cx="340" cy="308" rx="34" ry="38" fill="#2D3354" opacity="0.70"/>
        <path d="M308 290 Q312 262 320 251 Q330 237 340 235 Q352 233 362 244 Q374 256 374 282" stroke="#1A2040" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.75"/>
        <path d="M315 248 Q320 232 334 224 Q344 218 356 221 Q368 226 374 238" stroke="#1A2040" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.75"/>
      </g>
      <g opacity="0.35">
        <path d="M192 322 Q196 306 204 301 Q215 294 223 297 Q234 300 236 312 Q238 324 231 333 Q224 341 214 340 Q202 339 196 331Z" fill="#6B748F"/>

        <path d="M222 337 Q226 362 228 398" stroke="#6B748F" stroke-width="8" stroke-linecap="round" fill="none"/>

      <g opacity="0.30">
        <path d="M448 326 Q452 309 461 305 Q472 298 481 301 Q492 305 493 317 Q494 329 487 337 Q480 345 469 344 Q457 343 451 335Z" fill="#6B748F"/>

      </g>
      <g opacity="0.18">
        <circle cx="108" cy="400" r="22" fill="#A8B0C8"/>
        <path d="M96 422 Q93 452 90 486" stroke="#A8B0C8" stroke-width="9" stroke-linecap="round" fill="none"/>
        <path d="M120 422 Q123 452 126 486" stroke="#A8B0C8" stroke-width="9" stroke-linecap="round" fill="none"/>
      </g>
      <g opacity="0.18">
        <circle cx="574" cy="394" r="22" fill="#A8B0C8"/>
        <path d="M562 416 Q559 446 556 480" stroke="#A8B0C8" stroke-width="9" stroke-linecap="round" fill="none"/>
        <path d="M586 416 Q589 446 592 480" stroke="#A8B0C8" stroke-width="9" stroke-linecap="round" fill="none"/>

      <ellipse cx="340" cy="530" rx="280" ry="24" fill="rgba(91,127,232,0.06)"/>
    </svg>
  </div>
  <!-- 登录内容 -->
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;">
    <div style="font-size:32px;font-weight:800;letter-spacing:-1px;color:var(--text);margin-bottom:4px;text-align:center;">燥起来吧，少年！🔥</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:6px;text-align:center;line-height:1.7;">帮你在多件事之间，找到最该走的方向</div>
    <div style="font-size:15px;font-weight:600;color:var(--accent);margin-bottom:24px;letter-spacing:2px;">优先罗盘</div>
    <div class="login-form">
      <div class="login-label">用户名</div>
      <input class="login-input" id="nameInput" placeholder="输入你的用户名" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()"/>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="8.5" stroke="#5B7FE8" stroke-width="1.2"/>
      <circle cx="10" cy="10" r="5.5" stroke="#5B7FE8" stroke-width=".7" stroke-dasharray="2 1.2"/>
      <polygon points="10,3 11,10 10,11 9,10" fill="#5B7FE8"/>
      <polygon points="10,17 11,10 10,11 9,10" fill="#C8D3F5"/>
      <circle cx="10" cy="10" r="1.8" fill="#fff" stroke="#5B7FE8" stroke-width="1"/>
    </svg>
  </div>
  <div class="sidebar-user">
    <div class="user-avatar" id="userAvatar">?</div>
    <div class="user-name" id="userName">用户</div>
  </div>
  <div class="nav-item" id="navHome" onclick="switchView('home')">
    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M7 18v-7h6v7"/></svg>
    <span class="nav-label">首页</span>
  </div>
  <div class="nav-item" id="navTodo" onclick="switchView('todo')">
    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="14" height="14" rx="2"/><path d="M7 10l2 2 4-4"/></svg>
    <span class="nav-label">今日待办</span>
  </div>
  <div class="nav-item" id="navCal" onclick="switchView('cal')">
    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="16" height="14" rx="2"/><path d="M2 8h16M6 2v4M14 2v4"/></svg>
    <span class="nav-label">日历计划</span>

<script>
// ── SUPABASE ──
const SUPA_URL = 'https://izqdqyivolngcedwnysz.supabase.co';
const SUPA_KEY = 'sb_publishable_p1q_xvbLYLYAfKcYFy4xKA_-Dkhgz-s';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── STATE ──
// ── VOICE RECOGNITION ──
var voiceRecognition = null;
var voiceSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

function initVoice() {
  if (!voiceSupported) return;
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = 'zh-CN';
  voiceRecognition.continuous = false;
  voiceRecognition.interimResults = true;
  voiceRecognition.onresult = function(e) {
    var interim = '', final = '';
    for (var i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    var textarea = document.getElementById('evIn');
    if (!textarea) return;
    var preview = document.getElementById('voicePreview');
    // Show interim as preview
    if (preview) preview.textContent = interim ? '「' + interim + '」' : '';
    // Write final immediately
    if (final) {
      textarea.value = (textarea.value ? textarea.value + ' ' : '') + final;
      if (preview) preview.textContent = '';
    }
  };
  voiceRecognition.onerror = function(e) {
    console.warn('Voice error:', e.error);
    stopVoice();
  };
  voiceRecognition.onend = function() {
    // Flush any interim text when recognition ends
    var preview = document.getElementById('voicePreview');
    var textarea = document.getElementById('evIn');
    if (preview && preview.textContent && textarea) {
      var interimText = preview.textContent.replace(/^「|」$/g, '').trim();
      if (interimText) {
        textarea.value = (textarea.value ? textarea.value + ' ' : '') + interimText;
      }
      preview.textContent = '';
    }
    var btn = document.getElementById('micBtn');
    var status = document.getElementById('micStatus');
    if (btn) btn.classList.remove('listening');
    if (status) { status.textContent = '按住说话'; status.classList.remove('listening'); }
  };
}

function startVoice() {
  if (!voiceSupported) { initVoice(); }
  if (!voiceRecognition) return;
  try {
    voiceRecognition.start();
    var btn = document.getElementById('micBtn');
    var status = document.getElementById('micStatus');
    if (btn) btn.classList.add('listening');
    if (status) { status.textContent = '正在聆听…'; status.classList.add('listening'); }
  } catch(e) {
    // If already started, stop and restart
    try { voiceRecognition.stop(); } catch(e2) {}
    setTimeout(function(){ startVoice(); }, 200);
  }
}

function stopVoice() {
  if (!voiceRecognition) return;
  try { voiceRecognition.stop(); } catch(e) {}
  // Flush interim immediately on stop
  var preview = document.getElementById('voicePreview');
  var textarea = document.getElementById('evIn');
  if (preview && preview.textContent && textarea) {
    var interimText = preview.textContent.replace(/^「|」$/g, '').trim();
    if (interimText) {
      textarea.value = (textarea.value ? textarea.value + ' ' : '') + interimText;
    }
    preview.textContent = '';
  }
  var btn = document.getElementById('micBtn');
  var status = document.getElementById('micStatus');
  if (btn) btn.classList.remove('listening');
  if (status) { status.textContent = '按住说话'; status.classList.remove('listening'); }
}

var selectedCompareIds = new Set();

function toggleCompare() {
  var panel = document.getElementById('comparePanel');
  if (!panel) return;
  panel.classList.toggle('visible');
  if (panel.classList.contains('visible')) renderCompareList();

function renderCompareList() {
  var list = document.getElementById('compareList');
  if (!list) return;
  var others = S.history.filter(function(h) {
    return !S.lastDecisionId || String(h.id) !== String(S.lastDecisionId);
  });
  if (!others.length) {
    list.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px 0">暂无其他决策记录可对比</div>';
    return;
  }
  list.innerHTML = others.map(function(h) {
    var isSel = selectedCompareIds.has(String(h.id));
    var checkMark = isSel ? '✓' : '';
    var selClass = isSel ? ' selected' : '';
    return '<div class="compare-item'+selClass+'" data-compare-id="'+h.id+'" onclick="toggleCompareItem(this)">'+
      '<div class="compare-item-check">'+checkMark+'</div>'+
      '<div class="compare-item-text">'+h.event+'</div>'+
      '<div class="compare-item-score">'+h.score+'分</div>'+
    '</div>';
  }).join('');
}

function toggleCompareItem(el) {
  var id = String(el.getAttribute('data-compare-id'));
  if (selectedCompareIds.has(id)) selectedCompareIds.delete(id);
  else selectedCompareIds.add(id);
  renderCompareList();
}

async function runCompare() {
  if (!selectedCompareIds.size) { alert('请选择至少一个事项'); return; }
  var btn = document.querySelector('.compare-run-btn');
  if (btn) { btn.textContent = 'AI 分析中…'; btn.disabled = true; }
  var current = {
    event: S.eventText,
    score: S.reportData ? S.reportData.score : 0,
    verdict: S.reportData ? S.reportData.verdict : '',
    action: S.actionChoice
  };
  var others = S.history.filter(function(h) { return selectedCompareIds.has(String(h.id)); });
  var allItems = [current].concat(others.map(function(h) {
    return { event: h.event, score: h.score, verdict: h.verdict, action: h.action };
  }));
  var itemsDesc = allItems.map(function(item, i) {
    return (i===0?'【当前事项】':'【事项'+(i+1)+'】')+
      ' 事件：'+item.event+' 评分：'+item.score+'分 AI建议：'+item.verdict+
      (item.action?' 用户决策：'+item.action:'');
  }).join(' | ');
  var prompt = '你是优先级排序助手。用户有以下事项需要排序：'+itemsDesc+
    ' 请综合分析给出优先级排序和理由。'+
    '返回JSON：{"ranking":[{"rank":1,"event":"事件简述","score":分数,"reason":"理由（20字内）"},...],"summary":"综合建议（40字内）"}';
  var result = await callAI(prompt, 800);
  var rankData = null;
  try {
    if (result) {
      var match = result.match(/\{[\s\S]*\}/);
      rankData = match ? JSON.parse(match[0]) : null;
    }
  } catch(e) { console.warn('Compare parse error:', e); }
  if (btn) { btn.textContent = '重新对比'; btn.disabled = false; }
  var resultEl = document.getElementById('compareResult');
  if (!resultEl) return;
  resultEl.style.display = 'block';
  if (!rankData) {
    resultEl.innerHTML = '<div style="color:var(--text3);font-size:13px">分析失败，请重试</div>';
    return;
  }
  var rankClasses = ['rank1','rank2','rank3','rankn'];
  var rankLabels = ['\ud83e\udd47','\ud83e\udd48','\ud83e\udd49'];
  resultEl.innerHTML =
    '<div class="compare-result-title">优先级排序</div>'+
    (rankData.ranking||[]).map(function(item, i) {
      var cls = rankClasses[Math.min(i,3)];
      var lbl = i < 3 ? rankLabels[i] : (i+1)+'';
      return '<div class="compare-rank-item">'+
        '<div class="compare-rank-num '+cls+'">'+lbl+'</div>'+
        '<div class="compare-rank-text">'+item.event+'</div>'+
        '<div class="compare-rank-score">'+item.score+'分</div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--text3);padding:2px 12px 6px">'+item.reason+'</div>';
    }).join('')+
    '<div class="compare-ai-note">'+(rankData.summary||'')+'</div>';
}

async function doLogin() {
  var n = document.getElementById('nameInput').value.trim();
  var errEl = document.getElementById('loginError');
  var btn = document.getElementById('loginBtn');
  if (!n) { errEl.style.display = 'block'; errEl.textContent = '用户名不能为空'; return; }
  errEl.style.display = 'none';
  btn.textContent = '进入中…'; btn.style.opacity = '.6';

  try {
    // 查找或创建用户
    var { data: existing } = await supa.from('users').select('*').eq('username', n).single();
    var user;
    if (existing) {
      user = existing;
    } else {
      var { data: created, error } = await supa.from('users').insert({ username: n }).select().single();
      if (error) throw error;
      user = created;
    }
    S.user = user;
    document.getElementById('userAvatar').textContent = n[0].toUpperCase();
    document.getElementById('userName').textContent = n;
    document.getElementById('loginScreen').style.display = 'none';
    var h = new Date().getHours();
    document.getElementById('homeGreeting').textContent = (h<12?'早上好':h<18?'下午好':'晚上好') + '，' + n;
    await loadAllData();
    initVoice();
    switchView('home');
  } catch(e) {
    btn.textContent = '进入决策舱'; btn.style.opacity = '1';
    errEl.style.display = 'block'; errEl.textContent = '连接失败，请检查网络：' + e.message;
  }
}

  });
  ['navHome','navTodo','navCal','navDecision','navReview'].forEach(function(id){

  });
  var vmap={home:'homeView',todo:'todoView',cal:'calView',decision:'decisionView',review:'reviewView'};
  var nmap={home:'navHome',todo:'navTodo',cal:'navCal',decision:'navDecision',review:'navReview'};

  if(v==='decision'){t.style.display='flex';}else{t.style.display='block';t.classList.add('visible');}
  var nt=document.getElementById(nmap[v]);if(nt)nt.classList.add('active');

  if(v==='decision')renderDecision();
  if(v==='todo')renderTodos();
  if(v==='home'){S.calSelectedDate=null;renderHome();}
  if(v==='review')renderReview();
}

function renderTodos() {
  var list=document.getElementById('todoList'),dl=document.getElementById('doneTodoList'),lb=document.getElementById('doneSectionLabel');
  if(!list)return;

  // Update title based on selected date
  var titleEl = document.getElementById('todoViewTitle');
  var subEl = document.getElementById('todoViewSub');
  var today = new Date();
  var dateLabel = '今日';
  if(S.calSelectedDate) {
    var cd = S.calSelectedDate;
    var isToday = cd.toDateString() === today.toDateString();
    if(isToday) {
      dateLabel = '今日';
      if(subEl) subEl.textContent = '管理今天要处理的事情';
    } else {
      var m = cd.getMonth()+1, day = cd.getDate();
      dateLabel = m+'月'+day+'日';
      if(subEl) subEl.textContent = '从日历跳转 · '+cd.getFullYear()+'年'+m+'月'+day+'日';
    }
  } else {
    if(subEl) subEl.textContent = '管理今天要处理的事情';
  }
  if(titleEl) titleEl.textContent = dateLabel + '待办';

  // Show decisions for this date if came from calendar
  var decSection = document.getElementById('calDayDecisions');
  if(!decSection){
    var ds = document.createElement('div'); ds.id='calDayDecisions';
    list.parentNode.insertBefore(ds, list);
  }
  decSection = document.getElementById('calDayDecisions');
  if(S.calSelectedDate && S.history.length > 0){
    var cd = S.calSelectedDate;
    var dayDecisions = S.history.filter(function(h){
      var hd = new Date(h.date.replace(/\//g,'-'));
      return hd.toDateString() === cd.toDateString();
    });
    if(dayDecisions.length > 0){
      var ac = {'立即做':'var(--danger)','稍后做':'var(--warn)','仅存档':'var(--text3)'};
      decSection.innerHTML = '<div class="section-label" style="margin-top:4px">当日决策记录</div>'+
        dayDecisions.map(function(r){
          return '<div class="history-item" style="margin-bottom:6px;cursor:pointer" onclick="openHistoryModal(this)" data-hid="'+r.id+'">'+
            '<div style="display:flex;align-items:center;gap:8px">'+
              '<span class="history-event" style="flex:1">'+r.event+'</span>'+
              '<span class="history-score">'+r.score+'分</span>'+
            '</div>'+
            '<div class="history-meta"><span style="color:'+(ac[r.action]||'var(--text3)')+'">'+r.action+'</span>'+(r.time?'<span>'+r.time+'</span>':'')+'</div>'+
          '</div>';
        }).join('')+
        '<div class="section-label" style="margin-top:14px">待办事项</div>';
    } else {
      decSection.innerHTML = '';
    }
  } else {
    decSection.innerHTML = '';
  }

  // Filter by selected calendar date if set
  var filterDate = null;
  if (S.calSelectedDate) {
    var cd = S.calSelectedDate;
    filterDate = cd.getFullYear()+'-'+String(cd.getMonth()+1).padStart(2,'0')+'-'+String(cd.getDate()).padStart(2,'0');
  } else {
    var nd = new Date();
    filterDate = nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0')+'-'+String(nd.getDate()).padStart(2,'0');
  }
  var filteredTodos = S.todos.filter(function(t){
    if (!t.scheduledDate) return !S.calSelectedDate; // unscheduled only show on today view
    return t.scheduledDate === filterDate;
  });
  var pend=filteredTodos.filter(function(t){return!t.done;}),done=filteredTodos.filter(function(t){return t.done;});
  list.innerHTML=pend.length?pend.map(mkTodoHTML).join(''):'<div style="color:var(--text3);font-size:12px;padding:8px 0">暂无待办，点击上方添加</div>';
  lb.style.display=done.length?'block':'none';
  dl.innerHTML=done.map(mkTodoHTML).join('');
}
function mkTodoHTML(t){
  var pc=t.pri==='高'?'pri-high':t.pri==='中'?'pri-mid':'pri-low';
  var pl=t.pri==='高'?'紧急':t.pri==='中'?'本周':'计划';
  var flagIcon = (t.pri==='高' && !t.done) ? makeSVGFlagman(22) : '';
  var tid = String(t.id);
  return '<div class="todo-item" data-tid="'+tid+'">'+

    '<div class="todo-text'+(t.done?' striked':'')+'">'+t.text+'</div>'+

async function toggleTodo(id){

// ── CALENDAR ──
function renderCal(){
  var now=new Date(),d=new Date(now.getFullYear(),now.getMonth()+S.calOffset,1);
  var months=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calMonthLabel').textContent=d.getFullYear()+'年 '+months[d.getMonth()];
  var g=document.getElementById('calGrid');g.innerHTML='';
  ['日','一','二','三','四','五','六'].forEach(function(w){var e=document.createElement('div');e.className='cal-dow';e.textContent=w;g.appendChild(e);});
  var first=d.getDay(),dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate(),prev=new Date(d.getFullYear(),d.getMonth(),0).getDate(),today=new Date();
  // mark days with decisions
  var decDays=S.history.filter(function(h){
    var hd=new Date(h.date.replace(/\//g,'-'));
    return hd.getFullYear()===d.getFullYear()&&hd.getMonth()===d.getMonth();
  }).map(function(h){return new Date(h.date.replace(/\//g,'-')).getDate();});
  // Also mark days with scheduled todos
  var todoDays=S.todos.filter(function(t){
    if(!t.scheduledDate) return false;
    var td=new Date(t.scheduledDate);
    return td.getFullYear()===d.getFullYear()&&td.getMonth()===d.getMonth();
  }).map(function(t){return new Date(t.scheduledDate).getDate();});
  for(var i=0;i<first;i++){var e=document.createElement('div');e.className='cal-day other-month';e.textContent=prev-first+i+1;g.appendChild(e);}
  for(var i=1;i<=dim;i++){
    var e=document.createElement('div'); e.className='cal-day';
    if(S.calOffset===0&&i===today.getDate()) e.classList.add('today');
    if(decDays.includes(i)||todoDays.includes(i)) e.classList.add('has-event');
    e.textContent=i;
    // Click: jump to todo view filtered by this date
    (function(day){
      e.onclick=function(){
        S.calSelectedDate = new Date(d.getFullYear(), d.getMonth(), day);
        switchView('todo');
      };
    })(i);
    g.appendChild(e);
  }
  // show decisions for this month in event list
  var evList=document.getElementById('calEventList');
  var monthDecisions=S.history.filter(function(h){
    var hd=new Date(h.date.replace(/\//g,'-'));
    return hd.getFullYear()===d.getFullYear()&&hd.getMonth()===d.getMonth();
  });
  if(monthDecisions.length){
    var ac={'立即做':'#5B7FE8','稍后做':'#F0A030','仅存档':'#A8B0C8'};
    evList.innerHTML=monthDecisions.map(function(r){
      return '<div class="event-item"><div class="event-dot" style="background:'+(ac[r.action]||'#A8B0C8')+'"></div>'+
        '<div class="event-info"><div class="event-name">'+r.event+'</div><div class="event-time">'+r.date+(r.time?' · '+r.time:'')+'</div></div>'+
        '<div class="event-tag">'+r.action+'</div></div>';
    }).join('');
  } else {
    evList.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px 0">本月暂无决策记录</div>';
  }
}
function changeMonth(d){S.calOffset+=d;renderCal();}

function selChip(el){el.closest('.chip-row').querySelectorAll('.chip').forEach(function(c){c.classList.remove('selected');});el.classList.add('selected');}
function mkDimRow(def, si) {
  var selectedArr = Array.isArray(si) ? si : (si !== undefined && si !== null ? [si] : []);
  var chips = def.opts.map(function(o, i) {
    var isSel = def.multi ? selectedArr.indexOf(i) !== -1 : selectedArr[0] === i;
    var clickFn = def.multi ? 'selDimChipMulti(this)' : 'selDimChip(this)';
    return '<div class="dim-chip' + (isSel ? ' selected' : '') + '" onclick="' + clickFn + '">' + o + '</div>';
  }).join('');
  var hint = def.hint ? '<div class="dim-hint">' + def.hint + '</div>' : '';
  var note = '<div class="dim-note-wrap"><input class="dim-note" type="text" placeholder="补充说明（可选）" data-notekey="' + def.key + '" value="' + (S.dimNotes && S.dimNotes[def.key] ? S.dimNotes[def.key] : '') + '"/></div>';
  return '<div class="dim-row" data-key="' + def.key + '">' +
    '<div class="dim-label-wrap"><span class="dim-label">' + def.label + '</span>' + hint + '</div>' +
    '<div class="dim-right"><div class="dim-chips">' + chips + '</div>' + note + '</div>' +
  '</div>';
}
function selDimChip(el) {
  el.closest('.dim-chips').querySelectorAll('.dim-chip').forEach(function(c){c.classList.remove('selected');});

function collectDims() {
  if (!S.dimNotes) S.dimNotes = {};
  document.querySelectorAll('.dim-note[data-notekey]').forEach(function(inp) {
    S.dimNotes[inp.getAttribute('data-notekey')] = inp.value;
  });
  var r = {};
  document.querySelectorAll('.dim-row[data-key]').forEach(function(row) {
    var k = row.getAttribute('data-key');
    var def = DIM_DEFS.find(function(d){ return d.key === k; });
    if (def && def.multi) {
      var selected = [];
      row.querySelectorAll('.dim-chip.selected').forEach(function(c){ selected.push(c.textContent); });
      r[k] = selected.join('、');
    } else {
      var s = row.querySelector('.dim-chip.selected');
      r[k] = s ? s.textContent : '';
    }
  });
  return r;
}

async function aiPredict(){
  var dimDesc = DIM_DEFS.map(function(d,i){
    return i+'. '+d.key+'（'+d.label+'）'+(d.multi?'【可多选】':'')+'的选项：'+d.opts.map(function(o,j){return j+'='+o;}).join('，');
  }).join('\n');
  var p = '你是一个决策分析助手。\n用户描述的事件：「'+S.eventText+'」\n用户当前精力：'+S.energy+'，情绪：'+S.mood+'\n\n请根据事件内容，判断以下每个维度最合适的选项索引（从0开始）。多选维度请返回数组：\n'+dimDesc+
    '\n\n请只返回一个JSON对象，不要有任何解释或其他文字。格式如下（gain为多选示例）：\n{"time":0,"impact":1,"other":2,"cost":1,"block":2,"gain":[0,2],"burden":1}';
  console.log('AI预填请求发送中...');
  var t = await callAI(p, 300);
  console.log('AI预填原始返回:', t);
  try {
    if (t) {
      var match = t.match(/\{[\s\S]*\}/);
      var jsonStr = match ? match[0] : t;
      S.aiDims = JSON.parse(jsonStr);
      console.log('AI预填解析成功:', S.aiDims);
    } else {
      console.log('AI返回为空，使用启发式逻辑');
      S.aiDims = heuristic();
    }
  } catch(e) {
    console.warn('JSON解析失败，使用启发式逻辑。原文:', t, '错误:', e.message);
    S.aiDims = heuristic();
  }
  goStep(2);
}
function heuristic(){
  var d={time:1,impact:1,rev:2,other:2,cost:2,block:2,gain:0,burden:1};
  if(/今天|今晚|马上|立刻|紧急|deadline/i.test(S.eventText)){d.time=0;d.impact=0;}
  if(/老板|领导|客户|同事|等我/i.test(S.eventText)){d.other=0;}
  if(/一直在想|睡不着|很焦虑|烦死了/i.test(S.eventText)){d.burden=0;}
  if(/简单|快速|几分钟|顺手/i.test(S.eventText)){d.cost=0;}
  return d;
}

    // For multi-select, AI returns array of indices; for single, it returns a number
    var si;
    if (def.multi) {
      si = Array.isArray(raw) ? raw : (raw !== undefined ? [raw] : []);
    } else {
      si = typeof raw === 'number' ? raw : 0;
    }
    return mkDimRow(def, si);
  }).join('');
  c.innerHTML='<div class="step-heading">检查并修正<span class="ai-badge">AI已预填</span></div>'+
    '<div class="step-sub">AI根据描述自动判断，逐项确认，不对就点击修改。</div>'+

    '  "perspective": "基于知识库分析：做成类似这件事的人通常会经历什么过程，有哪些典型的后续发展，给用户提供真实参考预期",\n'+
    (appMode==='sassy' ?
      '  "sassyQuip": "用尖酸刻薄但不失幽默的语气，针对这件事的具体情况，给用户一句催命式的毒舌话，中英文混合，20-30字，带点刺激感，让他立刻想去行动"\n' :
      '  "sassyQuip": null\n')+

  console.log('发送分析报告请求...');

function fbReport(){
  // 按权重计算备用分数：时间30%、收益20%、后果15%、负担15%、他人10%、阻塞5%
  var scoreMap = {
    time:   {opts:['今天必须完成','本周内要完成','本月内要完成','没有明确截止'], scores:[100,70,40,10], weight:0.30},
    impact: {opts:['严重且不可挽回','较大但还能补救','一般有点影响','几乎没有后果'], scores:[100,70,40,10], weight:0.15},
    burden: {opts:['很重一直在脑子里转','有点压着但还好','没什么感觉'], scores:[100,60,10], weight:0.15},
    other:  {opts:['有人在等我今天就要回应','有人在等我但不急','只影响我自己'], scores:[100,50,10], weight:0.10},
    block:  {opts:['卡住好几件事必须先解决','影响一件事的推进','完全独立不影响其他'], scores:[100,50,10], weight:0.05}
  };
  var total = 0, weightSum = 0;
  Object.keys(scoreMap).forEach(function(k){
    var m = scoreMap[k];
    var v = S.dims[k] || '';
    var idx = m.opts.indexOf(v);
    if (idx < 0) idx = 1; // default mid
    total += m.scores[idx] * m.weight;
    weightSum += m.weight;
  });
  // gain 多选，每个选项+5分
  var gainVal = S.dims['gain'] || '';
  var gainBonus = gainVal ? Math.min(20, gainVal.split('、').length * 5) : 5;
  total += gainBonus * 0.20;

  var sc = Math.round(Math.min(100, total));
  return {
    score: sc,
    verdict: sc>=75?'立刻处理': sc>=45?'计划处理':'暂时搁置',
    verdict_level: sc>=75?'high': sc>=45?'mid':'low',
    summary: '综合时间压力与个人状态的初步判断',
    reasons: ['时间压力是决定紧迫程度的首要因素','心理负担直接影响当前处理意愿','做成收益决定这件事是否值得投入'],
    risks: ['拖延可能导致窗口期错失','持续占用心理空间影响其他事项效率','可能影响相关人员对你的信任'],
    window: '建议在精力充沛的上午时段处理',
    resources: ['需要明确完成所需的具体条件','确认是否有外部依赖需要提前协调'],
    steps: ['明确最终目标和验收标准','拆解成30分钟内可完成的最小任务','先完成最难或最关键的部分','收尾和复盘'],
    impact: '完成后可释放心理空间，提升整体工作效率；需注意避免因赶时间导致质量下降',
    perspective: '大多数人在时间压力较高时会优先处理，以避免后续压力叠加',
    timing: '结合当前精力状态，选择干扰最少的时间段专注处理',
    approach: '先用5分钟明确目标，再设定专注时间块逐步推进'

function makeRadar(){
  var keys=['time','impact','other','cost','block','gain','burden'],labels=['时间','后果','他人','耗时','阻塞','收益','负担'];
  var sm={time:[1,.7,.45,.2],impact:[1,.7,.4,.15],other:[.9,.55,.2],cost:[.3,.5,.75,.9,1],block:[1,.6,.1],gain:[.9,.65,.75,.8],burden:[.95,.6,.15]};
  var dd={};DIM_DEFS.forEach(function(d){dd[d.key]=d;});
  var vals=keys.map(function(k){
    var def=dd[k];if(!def)return.5;
    var raw=S.dims[k];
    if(def.multi){
      // multi: score based on count of selections
      return raw ? Math.min(1, (raw.split('、').length) * 0.3 + 0.4) : 0.4;
    }
    var idx=def.opts.indexOf(raw);if(idx<0)idx=0;
    var sc=sm[k]||[];return sc[idx]!==undefined?sc[idx]:.5;
  });
  var cx=75,cy=75,r=55,n=7,svg='';
  [.25,.5,.75,1].forEach(function(rr){var pts=[];for(var i=0;i<n;i++){var a=(Math.PI*2/n)*i-Math.PI/2;pts.push((cx+Math.cos(a)*r*rr).toFixed(1)+','+(cy+Math.sin(a)*r*rr).toFixed(1));}svg+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="rgba(99,120,210,0.13)" stroke-width="0.8"/>';});
  for(var i=0;i<n;i++){var a=(Math.PI*2/n)*i-Math.PI/2;svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+Math.cos(a)*r).toFixed(1)+'" y2="'+(cy+Math.sin(a)*r).toFixed(1)+'" stroke="rgba(99,120,210,0.09)" stroke-width="0.8"/>';}
  var dp=[];for(var i=0;i<n;i++){var a=(Math.PI*2/n)*i-Math.PI/2;dp.push((cx+Math.cos(a)*r*vals[i]).toFixed(1)+','+(cy+Math.sin(a)*r*vals[i]).toFixed(1));}
  svg+='<polygon points="'+dp.join(' ')+'" fill="rgba(91,127,232,0.18)" stroke="#5B7FE8" stroke-width="1.5"/>';
  for(var i=0;i<n;i++){var a=(Math.PI*2/n)*i-Math.PI/2;var lx=(cx+Math.cos(a)*(r+15)).toFixed(1),ly=(cy+Math.sin(a)*(r+15)).toFixed(1);svg+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#A8B0C8">'+labels[i]+'</text>';var dx=(cx+Math.cos(a)*r*vals[i]).toFixed(1),dy=(cy+Math.sin(a)*r*vals[i]).toFixed(1);svg+='<circle cx="'+dx+'" cy="'+dy+'" r="2.5" fill="#5B7FE8"/>';}
  return '<svg viewBox="0 0 150 150" width="150" height="150">'+svg+'</svg>';
}

function getScheduledDate(action, time) {
  // Returns a Date object for the scheduled date, or null if should not add
  var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  if (action === '仅存档') return null;

  // Skip if more than a week away
  var skipKeywords = ['一周后', '下周', '两周', '本月底', '下个月'];
  if (time && skipKeywords.some(function(k){ return time.indexOf(k) > -1; })) return null;

  if (action === '立即做') return today;

  if (action === '稍后做') {
    // Today keywords
    if (!time || ['今天上午','今天下午','今晚','今天'].some(function(k){ return time.indexOf(k) > -1; })) {
      return today;
    }
    // Tomorrow keywords
    if (['明天上午','明天下午','明天'].some(function(k){ return time.indexOf(k) > -1; })) {
      var tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
      return tomorrow;
    }
    // This week / weekend keywords → end of week (Sunday)
    if (['本周内','本周末','周末','这周','本周'].some(function(k){ return time.indexOf(k) > -1; })) {
      var daysToSun = 7 - today.getDay(); // days until next Sunday
      if (daysToSun === 0) daysToSun = 7;
      var sunday = new Date(today); sunday.setDate(today.getDate() + daysToSun);
      return sunday;
    }
    // Custom datetime string
    if (time && time.match(/\d{4}-\d{2}-\d{2}/)) {
      var d = new Date(time);
      var diffDays = (d - today) / (1000 * 60 * 60 * 24);
      if (diffDays >= 0 && diffDays <= 7) return d;
      return null;
    }
    // Fallback: today
    return today;
  }
  return null;
}

async function autoAddToTodo() {
  var scheduledDate = getScheduledDate(S.actionChoice, S.actionTime);
  if (!scheduledDate) return;

  var priority = S.actionChoice === '立即做' ? '高' : '中';
  var todoText = S.eventText.slice(0, 35);

  // Format date as YYYY-MM-DD for Supabase
  var y = scheduledDate.getFullYear();
  var m = String(scheduledDate.getMonth()+1).padStart(2,'0');
  var d = String(scheduledDate.getDate()).padStart(2,'0');
  var dateStr = y+'-'+m+'-'+d;

  var res = await supa.from('todos').insert({
    user_id: S.user.id,
    text: todoText,
    done: false,
    priority: priority,
    scheduled_date: dateStr
  }).select().single();

  if (!res.error && res.data) {
    S.todos.push({
      id: res.data.id,
      text: res.data.text,
      done: false,
      pri: res.data.priority,
      scheduledDate: dateStr
    });
    // Show toast
    var toast = document.getElementById('todoAddedToast');
    if (toast) {
      toast.style.display = 'flex';
      setTimeout(function(){ toast.style.display = 'none'; }, 3000);
    }
    console.log('已加入待办，日期：' + dateStr);
  }
}

        '<div class="history-check'+(isChecked?' checked':'')+ '" onclick="toggleHistorySelect(this,event)"></div>'+
        '<div style="flex:1;cursor:pointer" onclick="openReviewModal(this.closest(\'.history-item\').getAttribute(\'data-hid\'))">'+
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<span class="history-event" style="flex:1">'+r.event+'</span>'+
            reviewedBadge+
            '<span class="history-score">'+r.score+'分</span>'+
          '</div>'+
          '<div class="history-meta">'+
            '<span>'+r.date+'</span>'+
            '<span style="color:'+(ac[r.action]||'var(--text3)')+'">'+r.action+'</span>'+
            (r.time?'<span>'+r.time+'</span>':'')+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
  list.innerHTML = toolbarHTML + itemsHTML;
  updateHistoryToolbar();
}

function toggleHistorySelect(el, event){
  event.stopPropagation();
  var item = el.closest('.history-item');
  var id = item ? item.getAttribute('data-hid') : null;
  if(!id) return;
  if(selectedHistoryIds.has(id)) selectedHistoryIds.delete(id);
  else selectedHistoryIds.add(id);
  renderReview();
}

function updateHistoryToolbar(){
  var toolbar = document.getElementById('historyToolbar');
  var countEl = document.getElementById('selectedCount');
  if(!toolbar) return;
  if(selectedHistoryIds.size > 0){
    toolbar.classList.add('visible');
    if(countEl) countEl.textContent = '已选 ' + selectedHistoryIds.size + ' 条';
  } else {
    toolbar.classList.remove('visible');
  }
}

function clearHistorySelection(){
  selectedHistoryIds.clear();
  renderReview();
}

async function deleteSelectedHistory(){
  if(!selectedHistoryIds.size) return;
  var ids = Array.from(selectedHistoryIds);
  var res = await supa.from('decisions').delete().in('id', ids);
  if(res.error){ console.warn('删除失败:', res.error); showSync('❌ 删除失败'); return; }
  S.history = S.history.filter(function(h){ return !selectedHistoryIds.has(h.id); });
  selectedHistoryIds.clear();
  showSync('🗑 已删除');
  renderReview();
}

function openReviewModal(id){
  var record = S.history.find(function(h){ return String(h.id) === String(id); });
  if(!record) return;
  supa.from('decisions').select('*').eq('id', id).single().then(function(res){
    var d = res.data; if(!d) return;
    var r = d.report || {};
    var vl = r.verdict_level || 'mid';
    var vl2 = {high:'⚡ 立刻处理', mid:'📋 计划处理', low:'💤 暂时搁置'};
    var actionBadge = {'立即做':'now','稍后做':'later','仅存档':'archive'};
    document.getElementById('modalTitle').textContent = (d.event_text||'').slice(0,30)+(d.event_text&&d.event_text.length>30?'…':'');
    document.getElementById('modalMeta').textContent = new Date(d.created_at).toLocaleDateString('zh-CN')+(d.action_time?' · '+d.action_time:'');
    var savedDims = S.dims;
    S.dims = d.dims || {};
    var radarSvg = makeRadar();
    S.dims = savedDims;
    var sectionsHTML = '';
    if(r.summary) sectionsHTML += '<div class="report-section"><div class="report-section-title">事件本质</div><div class="report-section-body">'+r.summary+'</div></div>';
    if(r.window) sectionsHTML += '<div class="report-section"><div class="report-section-title">最佳执行时间窗口</div><div class="report-section-body">'+r.window+'</div></div>';
    if(r.impact) sectionsHTML += '<div class="report-section"><div class="report-section-title">对工作和身心的影响</div><div class="report-section-body">'+r.impact+'</div></div>';
    if(r.perspective) sectionsHTML += '<div class="report-section"><div class="report-section-title">参考视角</div><div class="report-section-body"><div class="perspective-box">'+r.perspective+'</div></div></div>';
    if(r.timing) sectionsHTML += '<div class="report-section"><div class="report-section-title">时机建议</div><div class="report-section-body">'+r.timing+'</div></div>';
    if(r.approach) sectionsHTML += '<div class="report-section"><div class="report-section-title">个性化倾向分析</div><div class="report-section-body">'+r.approach+'</div></div>';
    // Build review section
    var existingReview = d.review || {};
    var reviewHTML = '<div class="review-modal-section" data-review-id="'+d.id+'">'+
      '<div class="review-modal-title">复盘记录</div>'+
      '<div class="review-dim-row"><span class="review-dim-label">完成情况</span><div class="review-chips" id="rv-done">'+
        ['完成','部分完成','未完成'].map(function(o){
          return '<div class="review-chip'+(existingReview.done===o?' selected':'')+'" onclick="selReviewChip(this,\'rv-done\')">'+o+'</div>';
        }).join('')+
      '</div></div>'+
      '<div class="review-dim-row"><span class="review-dim-label">实际耗时</span><div class="review-chips" id="rv-time">'+
        ['<1小时','2-3小时','3-5小时','>5小时'].map(function(o){
          return '<div class="review-chip'+(existingReview.time===o?' selected':'')+'" onclick="selReviewChip(this,\'rv-time\')">'+o+'</div>';
        }).join('')+
      '</div></div>'+
      '<div class="review-dim-row"><span class="review-dim-label">完成状态</span><div class="review-chips" id="rv-state">'+
        ['精力充沛','还好','挣扎完成'].map(function(o){
          return '<div class="review-chip'+(existingReview.state===o?' selected':'')+'" onclick="selReviewChip(this,\'rv-state\')">'+o+'</div>';
        }).join('')+
      '</div></div>'+
      '<div style="margin-top:8px"><textarea class="review-textarea" id="rv-note" rows="3" placeholder="和预期有什么不同？有什么新的想法？">'+
        (existingReview.note||'')+
      '</textarea></div>'+
      (existingReview.aiAnalysis ? '<div class="review-ai-result">'+existingReview.aiAnalysis+'</div>' : '')+
      '<button class="review-submit-btn" onclick="submitReview(this.closest(\'[data-review-id]\').getAttribute(\'data-review-id\'))">'+
        (existingReview.done ? '更新复盘' : '提交复盘并获得 AI 分析')+
      '</button>'+
    '</div>';

    document.getElementById('modalBody').innerHTML =
      '<div class="modal-left">'+
        '<div class="radar-card" style="width:160px">'+radarSvg+
          '<div class="score-big" style="font-size:32px">'+(r.score||'-')+'</div>'+
          '<div class="score-label">综合优先级</div>'+
          '<div class="verdict-badge '+vl+'" style="margin-bottom:8px">'+(vl2[vl]||r.verdict||'')+'</div>'+
          '<div class="modal-action-badge '+(actionBadge[d.action_choice]||'archive')+'">'+(d.action_choice||'')+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="modal-right" style="overflow-y:auto;max-height:62vh">'+
        '<div class="report-sections">'+sectionsHTML+'</div>'+
        reviewHTML+
      '</div>';
    document.getElementById('historyModal').classList.add('visible');
  });
}

function closeHistoryModal(){
  document.getElementById('historyModal').classList.remove('visible');
}
function closeModal(event){
  if(event.target === document.getElementById('historyModal')) closeHistoryModal();
}

function selReviewChip(el, groupId){
  document.getElementById(groupId).querySelectorAll('.review-chip').forEach(function(c){c.classList.remove('selected');});
  el.classList.add('selected');
}

async function submitReview(decisionId){
  var done = '';
  var doneEl = document.getElementById('rv-done');
  if(doneEl){ var s=doneEl.querySelector('.review-chip.selected'); if(s) done=s.textContent; }
  var time = '';
  var timeEl = document.getElementById('rv-time');
  if(timeEl){ var s=timeEl.querySelector('.review-chip.selected'); if(s) time=s.textContent; }
  var state = '';
  var stateEl = document.getElementById('rv-state');
  if(stateEl){ var s=stateEl.querySelector('.review-chip.selected'); if(s) state=s.textContent; }
  var note = document.getElementById('rv-note') ? document.getElementById('rv-note').value : '';

  if(!done){ alert('请选择完成情况'); return; }

  // Get the decision record for AI analysis
  var record = S.history.find(function(h){ return String(h.id) === String(decisionId); });
  var btn = document.querySelector('.review-submit-btn');
  if(btn){ btn.textContent='AI 分析中…'; btn.disabled=true; }

  // AI review analysis
  var prompt = '你是一个决策复盘助手。\n'+
    '用户做了一个决策：「'+(record?record.event:'')+'」\n'+
    '当时AI建议：'+(record?record.verdict:'')+'\n'+
    '用户选择：'+(record?record.action:'')+'\n'+
    '复盘结果：完成情况='+done+'，实际耗时='+time+'，完成状态='+state+'\n'+
    (note?'用户备注：'+note+'\n':'')+
    '\n请给出深度复盘分析：\n'+
    '1. 这次决策和执行的整体评价\n'+
    '2. 预估和实际的差异分析（如果有）\n'+
    '3. 从这次经历中可以学到什么，对用户未来决策有什么启示\n'+
    '4. 用户的行为模式分析（结合这次表现）\n'+
    '直接给出分析文本，不需要JSON格式，语气自然亲切。';

  var aiResult = await callAI(prompt, 800);
  if(!aiResult) aiResult = '完成了这次决策，每一次经历都是成长的积累。';

  var reviewData = { done:done, time:time, state:state, note:note, aiAnalysis:aiResult };

  // Save to Supabase
  var res = await supa.from('decisions').update({ review: reviewData }).eq('id', decisionId);
  if(res.error){ console.warn('复盘保存失败:', res.error); }

  // Update local state
  var idx = S.history.findIndex(function(h){ return String(h.id)===String(decisionId); });
  if(idx > -1){ S.history[idx].reviewed = true; }

  // Show AI result in modal
  var aiResultEl = document.querySelector('.review-ai-result');
  if(aiResultEl){ aiResultEl.textContent = aiResult; }
  else {
    var textarea = document.getElementById('rv-note');
    if(textarea){
      var div = document.createElement('div');
      div.className = 'review-ai-result';
      div.textContent = aiResult;
      textarea.parentNode.after(div);
    }
  }
  if(btn){ btn.textContent='已更新复盘'; btn.disabled=false; }
  showSync('☁️ 复盘已保存');
  renderReview();
}

// ── AI CALL (via backend) ──
async function callAI(prompt, maxTok) {
  try {
    var res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'hunyuan-lite',
        max_tokens: maxTok || 400,
        temperature: 0.3,
        messages: [{role:'user', content: prompt}]
      })
    });
    if (!res.ok) {
      console.warn('API响应错误:', res.status, res.statusText);
      return null;
    }
    var data = await res.json();
    console.log('AI完整返回:', JSON.stringify(data));
    if (data.error) {
      console.warn('API返回错误:', data.error);
      return null;
    }
    if (!data.choices || !data.choices[0]) {
      console.warn('API返回格式异常:', data);
      return null;
    }
    return data.choices[0].message.content.trim().replace(/```json|```/g,'').trim();
  } catch(e) {
    console.warn('callAI异常:', e.message);
    return null;
  }
}
</script>
